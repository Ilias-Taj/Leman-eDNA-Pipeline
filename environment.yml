# environment.yml
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # --- Python & Base Tools ---
  - python=3.10
  - mamba       
  - pip
  - unzip
  
  # --- Bioinformatics Tools ---
  - filtlong              # Quality filtering for long reads
  - vsearch               # Global sequence alignment clustering & SINTAX taxonomy
  - samtools              # SAM/BAM file processing
  
  # --- Python Data Science Packages ---
  - biopython             # For BLAST interface (script 6)
  - pandas                # Data manipulation (scripts 4, 5, 7)
  - matplotlib            # Plotting (notebook analysis)
  - seaborn               # Statistical visualizations (notebook)
  - ipykernel             # Jupyter notebook kernel
  
  # --- Pip Packages ---
  - pip: 
      - biopython